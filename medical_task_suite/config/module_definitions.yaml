    secondary_modules: ["hallucination_free_diag", "structured_emr"]
  chronic_disease_management:
    primary_modules: ["lab_test_inquiry", "medication_guidance", "visit_instructions"]
    secondary_modules: ["lab_analysis", "insurance_guidance", "tcm_cognitive"]
  symptom_based_diagnosis:
    primary_modules: ["differential_diag", "lab_test_inquiry", "emergency_handling"]
