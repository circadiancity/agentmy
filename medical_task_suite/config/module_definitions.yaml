  emergency_triage:
    primary_modules: ["emergency_handling", "lab_test_inquiry", "differential_diag"]
    secondary_modules: ["visit_instructions", "hallucination_free_diag"]

# Difficulty-Level-Behavior Mapping
difficulty_behavior_mapping:
  L1:
    behavior_types: ["cooperative"]
    characteristics:
      - "提供完整准确信息"
      - "配合医生问诊"
      - "接受医生建议"
      - "描述清晰"
    task_percentage: 0.40
  L2:
    behavior_types: ["forgetful", "confused"]
    characteristics:
      - "记不清具体细节"
      - "需要医生引导"
      - "描述需要整理"
      - "部分信息缺失"
    task_percentage: 0.40
  L3:
    behavior_types: ["concealing", "pressuring", "refusing"]
    characteristics:
      - "隐瞒关键信息"
      - "施压要求快速诊断"
      - "拒绝检查建议"
      - "描述可能误导"
    task_percentage: 0.20

