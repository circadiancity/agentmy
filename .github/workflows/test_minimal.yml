name: Minimal Test

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  test-imports:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install tau2
      run: |
        pip install -e .

    - name: Test imports
      run: |
        python -c "
        import sys
        print('Python version:', sys.version)

        # Test 1: Core modules
        print('\\n=== Test Core Modules ===')
        from DataQualityFiltering.core import LLMEvaluator
        print('[OK] Core modules imported')

        # Test 2: Tau2 evaluators
        print('\\n=== Test Tau2 Evaluators ===')
        from tau2.evaluator import ClinicalEvaluator
        print('[OK] Tau2 evaluators imported')

        print('\\n=== ALL TESTS PASSED ===')
        "
